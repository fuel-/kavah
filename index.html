<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kavah — Scripture that moves with you</title>
  <meta name="description" content="Build playlists of Bible verses. Listen. Reflect. Share." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:      '#FAF7F2',
            espresso:   '#1A1208',
            gold:       '#C9A84C',
            amber:      '#8B5E3C',
            'text-dark':'#2C1A0E',
            'text-light':'#F5EDD8',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          },
          maxWidth: {
            container: '1280px',
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply font-sans text-text-dark bg-cream antialiased;
      }
      h1, h2, h3, h4 {
        @apply font-serif;
      }
    }
    @layer utilities {
      .container-pad {
        @apply max-w-container mx-auto px-6 lg:px-10;
      }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="nav" class="fixed top-0 left-0 right-0 z-50 transition-colors duration-300">
    <div class="container-pad flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="#" class="font-serif font-bold text-xl tracking-tight text-text-light" aria-label="Kavah home">
        Kavah
      </a>
      <!-- Right side -->
      <div class="flex items-center gap-4">
        <a href="#" class="hidden sm:inline text-text-light/70 hover:text-text-light font-sans text-sm transition-colors">
          Log In
        </a>
        <a href="#signup" class="bg-gold hover:bg-gold/90 text-espresso font-sans font-semibold text-sm px-5 py-2 rounded-full transition-colors">
          Sign Up Free
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="bg-espresso min-h-screen flex items-center pt-16">
    <div class="container-pad w-full py-24 lg:py-32">
      <div class="flex flex-col lg:flex-row lg:items-center lg:gap-16">

        <!-- Left: Copy -->
        <div class="flex-1 max-w-xl">
          <p class="text-gold font-sans text-sm font-semibold uppercase tracking-widest mb-6">
            Scripture for every season
          </p>
          <h1 class="font-serif font-black text-text-light text-5xl sm:text-6xl lg:text-7xl leading-[1.05] mb-6">
            Scripture that moves with&nbsp;you.
          </h1>
          <p class="text-text-light/70 font-sans text-lg leading-relaxed mb-10">
            Build playlists of Bible verses. Listen. Reflect. Share.
          </p>
          <div class="flex flex-col sm:flex-row gap-4">
            <a id="signup" href="#" class="bg-gold hover:bg-gold/90 text-espresso font-sans font-semibold px-8 py-4 rounded-full text-base text-center transition-colors">
              Sign Up Free
            </a>
            <a href="#how-it-works" class="text-text-light/70 hover:text-text-light font-sans text-base flex items-center justify-center gap-2 transition-colors">
              See how it works
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </a>
          </div>
        </div>

        <!-- Right: Now Playing Card -->
        <div class="flex-1 flex justify-center lg:justify-end mt-16 lg:mt-0">
          <div id="now-playing-card" class="w-full max-w-sm bg-white/5 border border-gold/20 rounded-2xl p-8 backdrop-blur-sm">
            <div class="flex items-center gap-2 mb-6">
              <span class="inline-flex gap-0.5 items-end h-4">
                <span class="w-1 bg-gold rounded-full animate-bounce" style="height:40%;animation-delay:0s"></span>
                <span class="w-1 bg-gold rounded-full animate-bounce" style="height:80%;animation-delay:0.15s"></span>
                <span class="w-1 bg-gold rounded-full animate-bounce" style="height:60%;animation-delay:0.3s"></span>
                <span class="w-1 bg-gold rounded-full animate-bounce" style="height:100%;animation-delay:0.1s"></span>
                <span class="w-1 bg-gold rounded-full animate-bounce" style="height:50%;animation-delay:0.25s"></span>
              </span>
              <span class="text-gold font-sans text-xs font-semibold uppercase tracking-widest ml-1">Now Playing</span>
            </div>
            <p class="text-text-light font-serif italic text-xl leading-relaxed mb-2" id="card-verse">
              "The Lord is my shepherd; I shall not want."
            </p>
            <p class="text-gold/80 font-sans text-sm mb-8" id="card-ref">Psalm 23:1</p>
            <div class="flex items-center justify-between">
              <p class="text-text-light/50 font-sans text-xs">From: <span class="text-text-light/80">Psalms of David</span></p>
              <button class="w-10 h-10 bg-gold rounded-full flex items-center justify-center hover:bg-gold/90 transition-colors" aria-label="Play">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-espresso ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script>
    // JS will be added in subsequent tasks
  </script>
</body>
</html>
